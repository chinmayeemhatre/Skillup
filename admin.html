<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — SKILLUP</title>
  <link rel="stylesheet" href="static/css/style.css">
  <style>
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--glass); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: var(--t); }
    .stat-card:hover { border-color: var(--yellow-l); transform: translateY(-5px); }
    .stat-val { font-size: 2.5rem; font-weight: 800; color: var(--yellow-l); margin-bottom: 4px; }
    .stat-label { font-size: 0.9rem; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
    
    .admin-section { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    
    .user-table { width: 100%; border-collapse: collapse; }
    .user-table th { text-align: left; padding: 14px; border-bottom: 1px solid var(--border); color: var(--text3); font-size: 0.8rem; text-transform: uppercase; }
    .user-table td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }
    .user-table tr:hover { background: rgba(255,255,255,0.02); }
    
    .badge-admin { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .badge-student { background: rgba(6,182,212,0.1); color: var(--cyan); border: 1px solid var(--cyan-d); }
    .badge-admin-role { background: rgba(244,212,123,0.1); color: var(--yellow); border: 1px solid var(--yellow-d); }
    
    .action-btn { background: none; border: none; cursor: pointer; color: var(--text3); transition: var(--t); font-size: 1.1rem; }
    .action-btn:hover { color: #ef4444; }
  </style>
</head>
<body class="dark-mode">
  <div class="custom-cursor"></div>
  <div class="glow"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SKILL<span>UP</span></a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="roadmap.html">Roadmap</a>
        <a href="leaderboard.html">Leaderboard</a>
      </div>
      <div class="nav-actions">
        <!-- Injected by api.js -->
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 120px;">
    <div class="header-section" style="margin-bottom: 40px;">
      <h1 class="glitch-text" data-text="Admin Dashboard">Admin Dashboard</h1>
      <p class="muted">Monitor platform activity and manage users.</p>
    </div>

    <!-- Stats Grid -->
    <div class="admin-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-val" id="totalUsers">-</div>
        <div class="stat-label">Total Students</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="totalXP">-</div>
        <div class="stat-label">Cumulative XP</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="totalLevels">-</div>
        <div class="stat-label">Active Levels</div>
      </div>
    </div>

    <!-- User Management Section -->
    <div class="admin-section">
      <div class="section-header">
        <h2>User Management</h2>
        <button class="btn btn-outline btn-sm" onclick="fetchUsers()">Refresh List 🔄</button>
      </div>
      <div style="overflow-x: auto;">
        <table class="user-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>College</th>
              <th>Level</th>
              <th>XP</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Injected by admin.js -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recent Activity Section -->
    <div class="admin-section">
      <h2>Recent Activity</h2>
      <div id="activityList" style="margin-top: 20px;">
        <!-- Injected by admin.js -->
      </div>
    </div>
  </main>

  <script src="static/js/api.js"></script>
  <script src="static/js/main.js"></script>
  <script>
    // Security check
    document.addEventListener('DOMContentLoaded', async () => {
      if (!SkillupAPI.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      const user = SkillupAPI.getUser();
      if (user.role !== 'admin') {
        alert('Access Denied: Admin role required');
        window.location.href = 'dashboard.html';
        return;
      }
      
      initAdmin();
    });

    async function initAdmin() {
      await Promise.all([fetchStats(), fetchUsers()]);
    }

    async function fetchStats() {
      try {
        const res = await SkillupAPI.getAdminStats();
        if (res.success) {
          document.getElementById('totalUsers').textContent = res.stats.totalUsers;
          document.getElementById('totalXP').textContent = res.stats.totalXP.toLocaleString();
          document.getElementById('totalLevels').textContent = res.stats.totalLevels;
          
          renderActivity(res.stats.recentActivity);
        }
      } catch (err) {
        showToast('Error fetching stats', 'error', '❌');
      }
    }

    async function fetchUsers() {
      try {
        const res = await SkillupAPI.getAdminUsers();
        if (res.success) {
          const tbody = document.getElementById('userTableBody');
          tbody.innerHTML = res.users.map(u => `
            <tr>
              <td>
                <div style="font-weight:600;">${u.name}</div>
                <div style="font-size:0.75rem;color:var(--text3);">${u.email}</div>
              </td>
              <td>
                <span class="badge-admin ${u.role === 'admin' ? 'badge-admin-role' : 'badge-student'}">${u.role}</span>
              </td>
              <td>${u.college || '—'}</td>
              <td>Lvl ${u.level}</td>
              <td style="color:var(--yellow-l);font-weight:700;">${u.xp} XP</td>
              <td>
                <button class="action-btn" onclick="deleteUser('${u._id}', '${u.name}')" title="Delete User">🗑️</button>
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        showToast('Error fetching users', 'error', '❌');
      }
    }

    function renderActivity(activity) {
      const container = document.getElementById('activityList');
      if (!activity || activity.length === 0) {
        container.innerHTML = '<p class="muted">No recent activity found.</p>';
        return;
      }
      container.innerHTML = activity.map(a => `
        <div style="padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
          <div>
            <span style="font-weight:600;">${a.user?.name || 'Unknown'}</span> completed Level ${a.levelNumber} Quiz
          </div>
          <div style="font-size: 0.8rem; color: var(--text3);">
            Score: <span style="color:var(--green);">${a.score}%</span> • ${new Date(a.createdAt).toLocaleDateString()}
          </div>
        </div>
      `).join('');
    }

    async function deleteUser(id, name) {
      if (!confirm(`Are you sure you want to delete user "${name}"? This action cannot be undone.`)) return;
      try {
        const res = await SkillupAPI.deleteUser(id);
        if (res.success) {
          showToast('User deleted successfully', 'success', '✅');
          fetchUsers();
          fetchStats();
        }
      } catch (err) {
        showToast(err.message, 'error', '❌');
      }
    }

    // Extend SkillupAPI with admin methods
    SkillupAPI.getAdminStats = () => SkillupAPI.apiFetch('/admin/stats');
    SkillupAPI.getAdminUsers = () => SkillupAPI.apiFetch('/admin/users');
    SkillupAPI.deleteUser = (id) => SkillupAPI.apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coding Lab — SKILLUP Sandbox</title>
  <link rel="stylesheet" href="static/css/style.css"/>
  <style>
    .lab-container { display: flex; flex-direction: column; height: calc(100vh - 70px); margin-top: 70px; }
    .lab-header { background: var(--bg-soft); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    .lab-main { display: grid; grid-template-columns: 1.2fr 0.8fr; flex: 1; min-height: 0; }
    .lab-editor { background: #0d1117; color: #e2ba61; font-family: 'Fira Code', monospace; font-size: 1rem; padding: 30px; border: none; outline: none; resize: none; line-height: 1.6; border-right: 1px solid var(--border); }
    .lab-sidebar { background: var(--bg); display: flex; flex-direction: column; overflow-y: auto; }
    .lab-section { padding: 20px; border-bottom: 1px solid var(--border); }
    .lab-section h4 { font-size: 0.9rem; color: var(--gold); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .console-output { background: #000; color: #fff; font-family: monospace; padding: 20px; flex: 1; overflow-y: auto; white-space: pre-wrap; font-size: 0.9rem; border-top: 1px solid var(--border); }
    .template-card { background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: var(--transition); }
    .template-card:hover { border-color: var(--gold); background: rgba(245,166,35,0.05); }
    .template-card h5 { margin-bottom: 4px; font-size: 0.85rem; }
    .template-card p { font-size: 0.75rem; color: var(--text3); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo"><div class="logo-icon">🎮</div><span>SKILLUP</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="coding_lab.html" class="active">Coding Lab</a>
    </div>
    <div class="nav-actions">
      <div class="xp-badge">⭐ 1,240 XP</div>
    </div>
  </div>
</nav>

<div class="lab-container">
  <div class="lab-header">
    <div style="display:flex; gap:20px; align-items:center;">
      <h3 style="font-size:1.1rem;">⚡ Interactive Sandbox</h3>
      <select class="btn btn-outline btn-sm" id="langSelect" style="background:var(--bg-soft); color:#fff; border-color:var(--border);">
        <option value="python">Python 3.10</option>
        <option value="javascript">JavaScript (Node.js)</option>
        <option value="cpp">C++ 20</option>
      </select>
    </div>
    <div style="display:flex; gap:12px;">
      <button class="btn btn-outline btn-sm" onclick="clearConsole()">Clear Console</button>
      <button class="btn btn-gold btn-sm" onclick="runSandboxCode()">Run Code ⚡</button>
    </div>
  </div>
  
  <div class="lab-main">
    <textarea class="lab-editor" id="labEditor" spellcheck="false" placeholder="# Start coding here..."></textarea>
    
    <div class="lab-sidebar">
      <div class="lab-section">
        <h4>Templates</h4>
        <div class="template-card" onclick="loadTemplate('hello')">
          <h5>Hello World</h5>
          <p>Simple output test.</p>
        </div>
        <div class="template-card" onclick="loadTemplate('dsa')">
          <h5>Binary Search</h5>
          <p>Optimized O(log n) algorithm.</p>
        </div>
        <div class="template-card" onclick="loadTemplate('react')">
          <h5>Mini React Component</h5>
          <p>Frontend structure test.</p>
        </div>
      </div>
      
      <div class="lab-section" style="flex:1; display:flex; flex-direction:column; padding:0;">
        <div style="padding:15px 20px; border-bottom:1px solid var(--border); font-size:0.8rem; font-weight:800; color:var(--text3);">CONSOLE OUTPUT</div>
        <div class="console-output" id="labOutput">> Ready for execution...</div>
      </div>
    </div>
  </div>
</div>

<script src="static/js/main.js"></script>
<script>
  const templates = {
    hello: {
      python: "print('Hello, Skillup World!')\n\n# Try changing the message and click Run!",
      javascript: "console.log('Hello, Skillup World!');",
      cpp: "#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << 'Hello World';\n    return 0;\n}"
    },
    dsa: {
      python: "def binary_search(arr, x):\n    low = 0\n    high = len(arr) - 1\n    while low <= high:\n        mid = (high + low) // 2\n        if arr[mid] < x:\n            low = mid + 1\n        elif arr[mid] > x:\n            high = mid - 1\n        else:\n            return mid\n    return -1\n\narr = [2, 3, 4, 10, 40]\nx = 10\nprint(f'Element found at index: {binary_search(arr, x)}')",
      javascript: "const binarySearch = (arr, x) => {\n  let low = 0, high = arr.length - 1;\n  while (low <= high) {\n    let mid = Math.floor((low + high) / 2);\n    if (arr[mid] < x) low = mid + 1;\n    else if (arr[mid] > x) high = mid - 1;\n    else return mid;\n  }\n  return -1;\n};\n\nconsole.log('Index:', binarySearch([2,3,4,10,40], 10));",
      cpp: "// Full C++ DSA template coming soon!"
    },
    react: {
      python: "# React templates are best used with JavaScript selection.",
      javascript: "import React, { useState } from 'react';\n\nconst App = () => {\n  const [val, setVal] = useState(0);\n  return <div onClick={() => setVal(v => v + 1)}>{val}</div>;\n};",
      cpp: "// Switch to JavaScript for React!"
    }
  };

  function loadTemplate(name) {
    const lang = document.getElementById('langSelect').value;
    document.getElementById('labEditor').value = templates[name][lang] || "";
    showToast(`Loaded ${name} template`, 'info', '📋');
  }

  function clearConsole() {
    document.getElementById('labOutput').textContent = "> Console cleared.";
  }

  function runSandboxCode() {
    const code = document.getElementById('labEditor').value;
    const output = document.getElementById('labOutput');
    output.textContent = "> Executing...\n";
    
    setTimeout(() => {
      // Simulation of execution
      output.textContent += "---------------------------------\n";
      output.textContent += "Output:\n";
      
      // Simple mock execution based on language
      const lang = document.getElementById('langSelect').value;
      if (lang === 'python') {
        if (code.includes('print')) {
           const match = code.match(/print\(['"](.+)['"]\)/);
           output.textContent += match ? match[1] : "Script finished successfully (no output).";
        } else {
           output.textContent += "Script finished successfully.";
        }
      } else if (lang === 'javascript') {
        try {
          // Dangerous but fine for a local static demo sandbox
          // console.log override would be better but let's simulate for now
          output.textContent += "Standard output: Code executed in sandbox mode.";
        } catch(e) {
          output.textContent += "Error: " + e.message;
        }
      } else {
        output.textContent += "Compilation successful. Executable running...";
      }
      
      output.textContent += "\n---------------------------------\n";
      output.textContent += "Process finished with exit code 0";
      showToast('Execution finished!', 'success', '⚡');
    }, 1000);
  }
  
  // Default load
  loadTemplate('hello');
</script>

</body>
</html>
